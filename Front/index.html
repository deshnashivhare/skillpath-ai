<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SkillPath AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-[#2b0a05] to-black text-white">

<!-- Navbar -->
<div class="flex justify-between items-center p-5">
  <h1 class="text-2xl font-bold text-orange-500">SkillPath AI.</h1>
  <button class="bg-orange-500 px-4 py-2 rounded-xl">Login</button>
</div>

<!-- Hero Section -->
<div class="text-center mt-20">
  <h1 class="text-5xl font-bold">
    Build Your <span class="text-orange-500">Career</span>
  </h1>
  <p class="text-gray-300 mt-4">
    Upload your resume and get AI-powered roadmap
  </p>

  <!-- Upload -->
  <input type="file" id="resume" class="hidden" />

  <button onclick="uploadResume()"
    class="mt-8 bg-orange-500 px-6 py-3 rounded-2xl">
    Upload Resume
  </button>

  <p id="fileName" class="mt-3 text-gray-400"></p>
</div>

<!-- Features -->
<div class="grid md:grid-cols-3 gap-6 p-10 mt-10">

  <div class="bg-[#1a0503] p-6 rounded-2xl">
    <h2 class="text-orange-500 text-xl">Skill Analysis</h2>
    <p class="text-gray-400">Analyze your resume instantly</p>
  </div>

  <div class="bg-[#1a0503] p-6 rounded-2xl">
    <h2 class="text-orange-500 text-xl">Course Recommendation</h2>
    <p class="text-gray-400">Get best learning roadmap</p>
  </div>

  <div class="bg-[#1a0503] p-6 rounded-2xl">
    <h2 class="text-orange-500 text-xl">AI Prediction</h2>
    <p class="text-gray-400">Know your selection chances</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
