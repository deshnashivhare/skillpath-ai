<!DOCTYPE html>
<html>
<head>

<title>SkillPath AI</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        height: 100vh;
        margin: 0;
    }

    .main-container {
        height: 100vh;
    }

    .left-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 60px;
    }

    .brand {
        font-size: 3rem;
        font-weight: bold;
    }

    .brand span {
        color: #f97316;
    }

    .upload-card {
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .btn-primary {
        background: #f97316;
        border: none;
    }

    .btn-primary:hover {
        background: #ea580c;
    }

    .form-control {
        background: #334155;
        border: none;
        color: white;
    }

    .form-control::file-selector-button {
        background: #475569;
        color: white;
        border: none;
    }
</style>

</head>

<body>

<div class="container-fluid main-container">
    <div class="row h-100">

        <!-- LEFT SIDE -->
        <div class="col-md-7 left-section">
            <h1 class="brand">SkillPath <span>AI</span></h1>

            <p class="mt-3 fs-5">
                Your personalized virtual mentor 🚀
            </p>

            <p class="text-muted">
                Upload your resume, analyze your skills, and get AI-powered career guidance tailored for you.
            </p>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-5 d-flex align-items-center justify-content-center">

            <div class="upload-card w-75">

                <h3 class="text-center mb-4">Upload Resume</h3>

                <form action="/analyze" method="post" enctype="multipart/form-data">

                    <!-- Resume Upload -->
                    <input class="form-control mb-3" type="file" name="resume" required>

                    <!-- Submit Button -->
                    <button class="btn btn-primary w-100">
                        Analyze Resume
                    </button>

                </form>

                {% if error %}
                <p class="text-danger text-center mt-3">
                    {{ error }}
                </p>
                {% endif %}

            </div>

        </div>

    </div>
</div>

</body>
</html>
